apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_bezier
  version: 0.1.0
  name: Bezier Pair
  description: Paired-sample scatter with curved Bezier-style links, colored group points, and optional paired significance annotation.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - paired
    - bezier
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - paired
    - bezier
    - patient-paired
    - statistical-annotation
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with pair id, group, and numeric value columns. See example.tsv converted from OmicsAgent scatter/bezier data.json.
  params:
    group_column:
      kind: string
      default: sample_type
    value_column:
      kind: string
      default: BRCA1
    pair_column:
      kind: string
      default: patient
    title:
      kind: string
      default: TCGA-ACC
    x_label:
      kind: string
      default: ""
    y_label:
      kind: string
      default: Expression of BRCA1
    group_order:
      kind: string
      default: Normal,Tumor
      description: Comma-separated group order. Empty keeps first-seen order from the table.
    palette:
      kind: string
      default: "#2dde98,#ff4f81"
      description: Comma-separated fill colors recycled if there are more groups.
    point_size:
      kind: number
      default: 3
    point_alpha:
      kind: number
      default: 0.9
    point_spread:
      kind: number
      default: 0.16
      description: Horizontal spread used to reveal paired points while keeping both ends linked.
    line_alpha:
      kind: number
      default: 0.5
    line_width:
      kind: number
      default: 0.35
    curve:
      kind: number
      default: 0.22
    bracket_text_size:
      kind: number
      default: 3.2
    base_size:
      kind: number
      default: 12
    show_lines:
      kind: boolean
      default: true
    show_significance:
      kind: boolean
      default: true
    alpha:
      kind: number
      default: 0.05
    max_brackets:
      kind: integer
      default: 3
    test:
      kind: enum
      enum: [wilcox.test, t.test]
      default: wilcox.test
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 4.2
    height:
      kind: number
      default: 5.6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - scatter_bezier
  - bezier_pair
  - paired_bezier
  - paired_scatter
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.group_column}
    - ${params.value_column}
    - ${params.pair_column}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.group_order}
    - ${params.palette}
    - ${params.point_size}
    - ${params.point_alpha}
    - ${params.point_spread}
    - ${params.line_alpha}
    - ${params.line_width}
    - ${params.curve}
    - ${params.bracket_text_size}
    - ${params.base_size}
    - ${params.show_lines}
    - ${params.show_significance}
    - ${params.alpha}
    - ${params.max_brackets}
    - ${params.test}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
