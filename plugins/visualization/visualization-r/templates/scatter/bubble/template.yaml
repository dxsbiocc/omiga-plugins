apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_bubble
  version: 0.1.0
  name: Bubble Plot
  description: Bubble scatter plot for three numeric variables plus optional grouping and labels.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - bubble
    - table
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - bubble
    - table
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table. See this template's example.tsv for the expected shape.
  params:
    x_column:
      kind: string
      default: x_value
      description: X-axis numeric column.
    y_column:
      kind: string
      default: y_value
      description: Y-axis numeric column.
    size_column:
      kind: string
      default: size_value
      description: Numeric column mapped to bubble size.
    group_column:
      kind: string
      default: group
      description: Optional grouping/color column. Use an empty string for no group.
    label_column:
      kind: string
      default: label
      description: Optional label column. Use an empty string for no labels.
    title:
      kind: string
      default: Bubble plot
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 7.5
    height:
      kind: number
      default: 5.5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - bubble
  - bubble_plot
  - scatter_bubble
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.x_column}
    - ${params.y_column}
    - ${params.size_column}
    - ${params.group_column}
    - ${params.label_column}
    - ${params.title}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
