apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_volcano
  version: 0.2.0
  name: Volcano Plot
  description: Publication-style volcano plot migrated from the OmicsAgent high-quality volcano visual; renders differential-result tables without the legacy JSON DSL.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - omics-preset
    - differential-result
    - threshold-annotation
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - omics-preset
    - differential-result
    - threshold-annotation
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table. See this template's example.tsv for the expected shape.
  params:
    log2fc_column:
      kind: string
      default: log2FC
    pvalue_column:
      kind: string
      default: qvalue
    label_column:
      kind: string
      default: symbol
    group_column:
      kind: string
      default: group
      description: Optional regulation/group column. If missing or blank, groups are derived from thresholds.
    log2fc_threshold:
      kind: number
      default: 1
    pvalue_threshold:
      kind: number
      default: 0.05
    title:
      kind: string
      default: Yap1-KO
    top_label_count:
      kind: integer
      default: 10
      description: Number of top significant labels to show per log2FC direction.
    x_limit:
      kind: number
      default: 12
      description: Symmetric x-axis limit used for the publication-style volcano layout.
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - volcano
  - volcano_plot
  - scatter_volcano
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.log2fc_column}
    - ${params.pvalue_column}
    - ${params.label_column}
    - ${params.group_column}
    - ${params.log2fc_threshold}
    - ${params.pvalue_threshold}
    - ${params.title}
    - ${params.top_label_count}
    - ${params.x_limit}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
