apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_heatmap_correlation
  version: 0.1.0
  name: Correlation Heatmap
  description: Correlation heatmap from a numeric matrix-style table using base R correlation plus ggplot2 tiles.
  tags:
    - visualization
    - r
    - ggplot2
    - heatmap
    - correlation
classification:
  category: visualization/heatmap
  tags:
    - visualization
    - r
    - ggplot2
    - heatmap
    - correlation
  stageInput:
    - numeric_matrix
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Numeric matrix-style CSV/TSV table. See this template's example.tsv for the expected shape.
  params:
    feature_column:
      kind: string
      default: feature
      description: Optional row-label column excluded from correlation. Use an empty string if all columns are numeric.
    method:
      kind: enum
      enum: [pearson, spearman, kendall]
      default: pearson
    title:
      kind: string
      default: Correlation heatmap
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 6
    height:
      kind: number
      default: 5.5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - correlation_heatmap
  - corr_heatmap
  - heatmap_correlation
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.feature_column}
    - ${params.method}
    - ${params.title}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
