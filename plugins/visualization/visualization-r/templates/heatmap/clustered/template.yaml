apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_heatmap_clustered
  version: 0.1.0
  name: Clustered Heatmap
  description: Clustered heatmap from a feature-by-sample numeric matrix.
  tags:
    - visualization
    - r
    - ggplot2
    - heatmap
    - clustered
    - matrix
classification:
  category: visualization/heatmap
  tags:
    - visualization
    - r
    - ggplot2
    - heatmap
    - clustered
    - matrix
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table. See this template's example.tsv for the expected shape.
  params:
    feature_column:
      kind: string
      default: feature
    title:
      kind: string
      default: Clustered heatmap
    scale_rows:
      kind: boolean
      default: true
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 7
    height:
      kind: number
      default: 5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - heatmap_clustered
  - clustered_heatmap
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.feature_column}
    - ${params.title}
    - ${params.scale_rows}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
