apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_bar_radial
  version: 0.1.0
  name: Radial Bar Plot
  description: Polar/radial bar chart for ordered categorical counts, migrated from OmicsAgent bar/radial.
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - radial
    - polar
    - table
classification:
  category: visualization/bar
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - radial
    - polar
    - categorical-counts
    - table
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table with one row per radial sector. See example.tsv for type/n columns.
  params:
    category_column:
      kind: string
      default: type
    value_column:
      kind: string
      default: n
    title:
      kind: string
      default: ""
    x_label:
      kind: string
      default: ""
    y_label:
      kind: string
      default: ""
    inner_radius:
      kind: number
      default: -500
      description: Negative lower radial limit used to create a hollow center.
    max_value:
      kind: string
      default: auto
      description: Outer y/radius limit. Use auto or a numeric value.
    ring_breaks:
      kind: string
      default: 0,500,1000
      description: Comma-separated radial guide values.
    palette:
      kind: string
      default: "#d7689d,#f3d337,#a0c443,#66b5ae,#5da4dc,#40769e"
      description: Comma-separated colors; interpolated when there are more categories.
    bar_width:
      kind: number
      default: 0.88
    ring_color:
      kind: string
      default: grey75
    label_size:
      kind: number
      default: 4.2
    base_size:
      kind: number
      default: 12
    value_labels:
      kind: boolean
      default: false
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 8
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - radial_bar
  - bar_radial
  - polar_bar
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.category_column}
    - ${params.value_column}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.inner_radius}
    - ${params.max_value}
    - ${params.ring_breaks}
    - ${params.palette}
    - ${params.bar_width}
    - ${params.ring_color}
    - ${params.label_size}
    - ${params.base_size}
    - ${params.value_labels}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
