apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_bar_gene_terms
  version: 0.1.0
  name: Gene Terms
  description: Enrichment term bars with grouped direction and gene labels, migrated from OmicsAgent bar/enrichment_genes.
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - enrichment
    - genes
    - pathway
    - table
classification:
  category: visualization/bar
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - enrichment
    - genes
    - pathway
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Enrichment result CSV/TSV with term, adjusted p-value, genes, and direction columns. See example.tsv converted from OmicsAgent data.json.
  params:
    term_column:
      kind: string
      default: Description
    pvalue_column:
      kind: string
      default: p.adjust
    gene_column:
      kind: string
      default: geneID
    group_column:
      kind: string
      default: Change
    title:
      kind: string
      default: ""
    x_label:
      kind: string
      default: "-log10(p.adjust)"
    group_order:
      kind: string
      default: Positive,Negative
      description: Comma-separated group order, or auto.
    palette:
      kind: string
      default: "#79ceb8,#e95f5c"
    pvalue_floor:
      kind: number
      default: 1e-8
    max_log10_pvalue:
      kind: number
      default: 8
    x_breaks:
      kind: string
      default: auto
    label_x:
      kind: number
      default: 0.1
    term_size:
      kind: number
      default: 4
    gene_size:
      kind: number
      default: 3.2
    gene_label_max_chars:
      kind: integer
      default: 88
      description: Maximum displayed gene-label characters; use 0 to disable truncation.
    bar_width:
      kind: number
      default: 0.68
    bar_alpha:
      kind: number
      default: 0.58
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - enrichment_genes
  - gene_terms
  - term_genes
  - enrichment_terms
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.term_column}
    - ${params.pvalue_column}
    - ${params.gene_column}
    - ${params.group_column}
    - ${params.title}
    - ${params.x_label}
    - ${params.group_order}
    - ${params.palette}
    - ${params.pvalue_floor}
    - ${params.max_log10_pvalue}
    - ${params.x_breaks}
    - ${params.label_x}
    - ${params.term_size}
    - ${params.gene_size}
    - ${params.gene_label_max_chars}
    - ${params.bar_width}
    - ${params.bar_alpha}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
