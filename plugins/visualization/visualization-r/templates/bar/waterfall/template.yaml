apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_bar_waterfall
  version: 0.1.0
  name: Waterfall Bar Plot
  description: Waterfall chart for ordered totals and positive/negative changes, migrated from OmicsAgent bar/waterfall.
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - waterfall
    - table
classification:
  category: visualization/bar
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - waterfall
    - financial
    - change
    - table
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table. Use ordered rows; see example.tsv for desc/amount columns.
  params:
    label_column:
      kind: string
      default: desc
      description: Ordered category/step label column.
    amount_column:
      kind: string
      default: amount
      description: Numeric total/change amount column.
    type_column:
      kind: string
      default: ""
      description: Optional row type column with total/change values. Empty uses total_mode.
    total_mode:
      kind: enum
      enum: [first_last, none]
      default: first_last
      description: Treat first and last rows as absolute totals, or treat every row as a delta.
    title:
      kind: string
      default: Waterfall plot
    x_label:
      kind: string
      default: ""
    y_label:
      kind: string
      default: Amount
    value_labels:
      kind: boolean
      default: true
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 5.5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - waterfall
  - waterfall_bar
  - bar_waterfall
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.label_column}
    - ${params.amount_column}
    - ${params.type_column}
    - ${params.total_mode}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.value_labels}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
