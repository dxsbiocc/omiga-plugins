apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_bar_butterfly
  version: 0.1.0
  name: Butterfly
  description: Two-sided butterfly/population-pyramid bar chart for comparing two groups across ordered categories, migrated from OmicsAgent bar/butterfly.
  tags:
  - visualization
  - r
  - ggplot2
  - bar
  - butterfly
  - population-pyramid
  - comparison
  - table
classification:
  category: visualization/bar
  tags:
  - visualization
  - r
  - ggplot2
  - bar
  - butterfly
  - population-pyramid
  - comparison
  stageInput:
  - table
  stageOutput:
  - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: CSV/TSV table with ordered category, two-level group, and count/value columns. See example.tsv converted from OmicsAgent data.json.
  params:
    category_column:
      kind: string
      default: Age
    group_column:
      kind: string
      default: Sex
    value_column:
      kind: string
      default: Count
    title:
      kind: string
      default: ''
    x_label:
      kind: string
      default: ''
    y_label:
      kind: string
      default: ''
    group_order:
      kind: string
      default: males,females
      description: Comma-separated two-group order. The first group is drawn on the left/negative side by default.
    left_group:
      kind: string
      default: auto
      description: Group drawn on the left/negative side. Use auto for the first group in group_order.
    category_order:
      kind: string
      default: auto
      description: Comma-separated category order, or auto.
    palette:
      kind: string
      default: '#d7689d,#f3d337,#a0c443,#66b5ae,#5da4dc,#40769e'
      description: Comma-separated group colors; the first two are used for the default example.
    x_breaks:
      kind: string
      default: auto
      description: Comma-separated absolute axis breaks. Use auto to derive pretty breaks from the data.
    x_limit:
      kind: string
      default: auto
      description: Absolute x-axis limit. Use auto or a numeric value.
    bar_width:
      kind: number
      default: 0.82
    bar_alpha:
      kind: number
      default: 0.95
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum:
      - auto
      - tab
      - comma
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
- butterfly
- butterfly_bar
- population_pyramid
- mirrored_bar
execution:
  interpreter: Rscript
  argv:
  - ${inputs.table}
  - ${outdir}
  - ${params.category_column}
  - ${params.group_column}
  - ${params.value_column}
  - ${params.title}
  - ${params.x_label}
  - ${params.y_label}
  - ${params.group_order}
  - ${params.left_group}
  - ${params.category_order}
  - ${params.palette}
  - ${params.x_breaks}
  - ${params.x_limit}
  - ${params.bar_width}
  - ${params.bar_alpha}
  - ${params.base_size}
  - ${params.delimiter}
  - ${params.width}
  - ${params.height}
  - ${params.dpi}
