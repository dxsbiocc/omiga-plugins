apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_bar_stacked_percent
  version: 0.2.0
  name: Stacked Percent
  description: Publication-style faceted percent bar chart migrated from OmicsAgent bar/percent, with generic stacked and within-category percent modes.
  tags:
  - visualization
  - r
  - ggplot2
  - bar
  - stacked
  - percent
classification:
  category: visualization/bar
  tags:
  - visualization
  - r
  - ggplot2
  - bar
  - stacked
  - percent
  - table
  stageInput:
  - table
  stageOutput:
  - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table. See this template's example.tsv for the expected shape.
  params:
    category_column:
      kind: string
      default: type
    segment_column:
      kind: string
      default: symbol
    value_column:
      kind: string
      default: freq
    mode:
      kind: enum
      enum:
      - faceted_percent
      - stacked
      - percent
      default: faceted_percent
      description: Use faceted_percent for OmicsAgent-style per-segment horizontal percent panels, stacked for raw values, or percent for within-category proportions.
    title:
      kind: string
      default: ''
    axis_percent_max:
      kind: number
      default: 0.5
      description: Maximum x-axis percent value for faceted_percent mode.
    delimiter:
      kind: enum
      enum:
      - auto
      - tab
      - comma
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
- stacked_bar
- percent_bar
- stacked_percent
execution:
  interpreter: Rscript
  argv:
  - ${inputs.table}
  - ${outdir}
  - ${params.category_column}
  - ${params.segment_column}
  - ${params.value_column}
  - ${params.mode}
  - ${params.title}
  - ${params.axis_percent_max}
  - ${params.delimiter}
  - ${params.width}
  - ${params.height}
  - ${params.dpi}
