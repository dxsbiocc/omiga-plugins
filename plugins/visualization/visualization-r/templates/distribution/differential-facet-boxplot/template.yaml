apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_distribution_differential_facet_boxplot
  version: 0.1.0
  name: Facet Boxplot
  description: Faceted differential boxplot that draws each feature in its own panel with jittered points and significance labels, migrated from OmicsAgent boxplot/differential_facet.
  tags:
  - visualization
  - r
  - ggplot2
  - distribution
  - boxplot
  - differential
  - facet
  - table
classification:
  category: visualization/distribution
  tags:
  - visualization
  - r
  - ggplot2
  - distribution
  - boxplot
  - differential-expression
  - faceted
  - jittered-points
  - statistical-annotation
  stageInput:
  - table
  stageOutput:
  - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with feature/gene, group, and numeric value columns. See example.tsv converted from OmicsAgent data.json.
  params:
    facet_column:
      kind: string
      default: gene
    group_column:
      kind: string
      default: group
    value_column:
      kind: string
      default: exprs
    title:
      kind: string
      default: ''
    x_label:
      kind: string
      default: ''
    y_label:
      kind: string
      default: Gene expression level
    facet_order:
      kind: string
      default: auto
      description: Optional comma-separated facet order.
    group_order:
      kind: string
      default: Normal,Tumor
      description: Comma-separated group order, or auto.
    palette:
      kind: string
      default: '#8F499C,#4185BE,#6DC067,#F6DB35,#F78822'
      description: Comma-separated group colors recycled if needed.
    box_width:
      kind: number
      default: 0.62
    point_size:
      kind: number
      default: 2
    point_alpha:
      kind: number
      default: 0.6
    jitter_width:
      kind: number
      default: 0.15
    strip_fill:
      kind: string
      default: '#6dc067'
    bracket_text_size:
      kind: number
      default: 3.5
    base_size:
      kind: number
      default: 11
    show_points:
      kind: boolean
      default: true
    show_significance:
      kind: boolean
      default: true
    alpha:
      kind: number
      default: 0.05
    test:
      kind: enum
      enum:
      - wilcox.test
      - t.test
      default: wilcox.test
    random_seed:
      kind: integer
      default: 7
    delimiter:
      kind: enum
      enum:
      - auto
      - tab
      - comma
      default: auto
    width:
      kind: number
      default: 6
    height:
      kind: number
      default: 5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
- differential_facet_boxplot
- faceted_differential_boxplot
- boxplot_differential_facet
- faceted_expression_boxplot
execution:
  interpreter: Rscript
  argv:
  - ${inputs.table}
  - ${outdir}
  - ${params.facet_column}
  - ${params.group_column}
  - ${params.value_column}
  - ${params.title}
  - ${params.x_label}
  - ${params.y_label}
  - ${params.facet_order}
  - ${params.group_order}
  - ${params.palette}
  - ${params.box_width}
  - ${params.point_size}
  - ${params.point_alpha}
  - ${params.jitter_width}
  - ${params.strip_fill}
  - ${params.bracket_text_size}
  - ${params.base_size}
  - ${params.show_points}
  - ${params.show_significance}
  - ${params.alpha}
  - ${params.test}
  - ${params.random_seed}
  - ${params.delimiter}
  - ${params.width}
  - ${params.height}
  - ${params.dpi}
