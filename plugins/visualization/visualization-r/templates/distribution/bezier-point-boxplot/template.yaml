apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_distribution_bezier_point_boxplot
  version: 0.1.0
  name: Bezier Point Boxplot
  description: Faceted grouped boxplot with overlaid points and smooth Bezier sample-connection curves, migrated from OmicsAgent boxplot/bezier_point.
  tags:
    - visualization
    - r
    - ggplot2
    - distribution
    - boxplot
    - bezier
    - facet
    - table
classification:
  category: visualization/distribution
  tags:
    - visualization
    - r
    - ggplot2
    - distribution
    - boxplot
    - bezier-curve
    - grouped-points
    - faceted
    - statistical-annotation
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with facet/gene, group, and numeric value columns. See example.tsv converted from OmicsAgent data.json.
  params:
    facet_column:
      kind: string
      default: gene
    group_column:
      kind: string
      default: group
    value_column:
      kind: string
      default: exprs
    pair_column:
      kind: string
      default: auto
      description: Optional sample/pair id column. Use auto to pair the nth observation across the two groups within each facet.
    title:
      kind: string
      default: ""
    x_label:
      kind: string
      default: ""
    y_label:
      kind: string
      default: Gene expression level
    group_order:
      kind: string
      default: Normal,Tumor
      description: Comma-separated two-group order, or auto.
    facet_order:
      kind: string
      default: auto
      description: Optional comma-separated facet order.
    palette:
      kind: string
      default: "#ed6ca4,#fbb05b,#acd372,#7bc4e2"
      description: Comma-separated group colors recycled if needed.
    box_width:
      kind: number
      default: 0.62
    point_size:
      kind: number
      default: 3
    point_alpha:
      kind: number
      default: 0.7
    point_jitter_width:
      kind: number
      default: 0
    curve_alpha:
      kind: number
      default: 0.7
    curve_width:
      kind: number
      default: 0.45
    curve_color:
      kind: string
      default: "#caccd1"
    curve_control_offset:
      kind: number
      default: 0.3
    curve_steps:
      kind: integer
      default: 30
    strip_fill:
      kind: string
      default: "#a0c44387"
    base_size:
      kind: number
      default: 11
    show_curves:
      kind: boolean
      default: true
    show_significance:
      kind: boolean
      default: true
    alpha:
      kind: number
      default: 0.05
    test:
      kind: enum
      enum: [wilcox.test, t.test]
      default: wilcox.test
    random_seed:
      kind: integer
      default: 7
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 7
    height:
      kind: number
      default: 5.5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - bezier_point_boxplot
  - boxplot_bezier_point
  - grouped_bezier_boxplot
  - faceted_boxplot_points
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.facet_column}
    - ${params.group_column}
    - ${params.value_column}
    - ${params.pair_column}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.group_order}
    - ${params.facet_order}
    - ${params.palette}
    - ${params.box_width}
    - ${params.point_size}
    - ${params.point_alpha}
    - ${params.point_jitter_width}
    - ${params.curve_alpha}
    - ${params.curve_width}
    - ${params.curve_color}
    - ${params.curve_control_offset}
    - ${params.curve_steps}
    - ${params.strip_fill}
    - ${params.base_size}
    - ${params.show_curves}
    - ${params.show_significance}
    - ${params.alpha}
    - ${params.test}
    - ${params.random_seed}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
