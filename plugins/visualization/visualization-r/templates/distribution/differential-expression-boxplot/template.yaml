apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_distribution_differential_expression_boxplot
  version: 0.1.0
  name: DE Boxplot
  description: Differential-expression boxplot migrated from OmicsAgent boxplot/differential_expression with jittered samples, manual stage palette, and pairwise significance brackets.
  tags:
  - visualization
  - r
  - ggplot2
  - distribution
  - boxplot
  - differential-expression
  - statistical-annotation
classification:
  category: visualization/distribution
  tags:
  - visualization
  - r
  - ggplot2
  - distribution
  - boxplot
  - differential-expression
  - statistical-annotation
  stageInput:
  - table
  stageOutput:
  - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with group and expression columns. See example.tsv converted from OmicsAgent data.json.
  params:
    group_column:
      kind: string
      default: stage
    value_column:
      kind: string
      default: TP53
    label_column:
      kind: string
      default: patient
    title:
      kind: string
      default: TCGA-ACC
    x_label:
      kind: string
      default: ''
    y_label:
      kind: string
      default: Expression of TP53
    group_order:
      kind: string
      default: Stage I,Stage II,Stage III,Stage IV,Unknown
      description: Comma-separated group order, or auto.
    palette:
      kind: string
      default: '#337ab7,#5bc0de,#5cb85c,#f0ad4e,#d9534f'
      description: Comma-separated fill colors recycled if there are more groups.
    box_alpha:
      kind: number
      default: 0.8
    point_size:
      kind: number
      default: 3
    point_alpha:
      kind: number
      default: 0.6
    jitter_width:
      kind: number
      default: 0.2
    bracket_text_size:
      kind: number
      default: 3.2
    base_size:
      kind: number
      default: 12
    show_significance:
      kind: boolean
      default: true
    alpha:
      kind: number
      default: 0.05
    max_brackets:
      kind: integer
      default: 8
    test:
      kind: enum
      enum:
      - wilcox.test
      - t.test
      default: wilcox.test
    random_seed:
      kind: integer
      default: 7
    delimiter:
      kind: enum
      enum:
      - auto
      - tab
      - comma
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
- differential_expression_boxplot
- boxplot_differential_expression
- expression_stage_boxplot
execution:
  interpreter: Rscript
  argv:
  - ${inputs.table}
  - ${outdir}
  - ${params.group_column}
  - ${params.value_column}
  - ${params.label_column}
  - ${params.title}
  - ${params.x_label}
  - ${params.y_label}
  - ${params.group_order}
  - ${params.palette}
  - ${params.box_alpha}
  - ${params.point_size}
  - ${params.point_alpha}
  - ${params.jitter_width}
  - ${params.bracket_text_size}
  - ${params.base_size}
  - ${params.show_significance}
  - ${params.alpha}
  - ${params.max_brackets}
  - ${params.test}
  - ${params.random_seed}
  - ${params.delimiter}
  - ${params.width}
  - ${params.height}
  - ${params.dpi}
