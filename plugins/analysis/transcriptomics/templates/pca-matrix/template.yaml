apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: pca_matrix_basic
  version: 0.3.0
  name: PCA Matrix Overview
  description: Rendered R PCA analysis template for numeric omics matrices with private validation metadata.
  tags:
    - omics
    - transcriptomics
    - pca
    - dimensionality-reduction
classification:
  category: omics/transcriptomics/dimensionality-reduction
  tags:
    - rna
    - pca
    - matrix
    - sample-overview
    - figure
  stageInput:
    - count_matrix
    - expression_matrix
    - sample_metadata
  stageOutput:
    - pca_scores
    - pca_plots
exposure:
  exposeToAgent: true
interface:
  inputs: {}
  params: {}
  outputs: {}
runtime:
  envRef: r-bioc
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - pca_basic
  - pca_matrix
  - sample_pca
execution:
  interpreter: Rscript
  fallbackToMigrationTarget: true
  argv:
    - ${inputs.matrix}
    - ${outdir}
    - ${params.delimiter}
    - ${params.row_names}
    - ${params.features_by_rows}
    - ${params.center}
    - ${params.scale}
    - ${params.top_variable_features}
    - ${inputs.metadata}
    - ${params.sample_column}
    - ${params.group_column}
    - ${params.plot_labels}
    - ${params.confidence_hulls}
migrationTarget: omics_pca_matrix
