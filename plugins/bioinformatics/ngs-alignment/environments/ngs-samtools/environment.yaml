apiVersion: omiga.ai/environment/v1alpha1
kind: Environment
metadata:
  id: ngs-samtools
  version: 0.1.0
  name: Samtools
  description: Conda environment for standalone samtools SAM/BAM/CRAM utilities used outside fused aligner pipelines.
  tags: [bioinformatics, ngs, samtools, sam, bam, cram]
runtime:
  type: conda
  condaEnvFile: ./conda.yaml
requirements:
  system:
    - micromamba or mamba or conda
  notes:
    - Environment is created under .omiga/operator-envs/conda and reused by hash.
    - Alignment operators keep their own samtools dependency for stable fused align-sort-index pipelines.
diagnostics:
  checkCommand: [samtools, --version]
  installHint: Install the official micromamba binary at $HOME/.omiga/bin/micromamba or set OMIGA_MICROMAMBA; Omiga can create this env from conda.yaml/conda.yml.
