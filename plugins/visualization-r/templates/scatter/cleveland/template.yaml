apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_cleveland
  version: 0.1.0
  name: Cleveland
  description: Cleveland dot plot with horizontal guide segments and emphasized endpoint dots for ranked counts or scores.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - cleveland
    - dot-plot
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - cleveland
    - dot-plot
    - ranked
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Two-column or long-form CSV/TSV table with item labels and numeric values. See example.tsv converted from OmicsAgent scatter/cleveland data.json.
  params:
    item_column:
      kind: string
      default: Tissue
    value_column:
      kind: string
      default: Count
    top_n:
      kind: integer
      default: 20
      description: Number of ranked rows to show. Use 0 or negative to keep all rows.
    sort_order:
      kind: enum
      enum: [descending, ascending, input]
      default: descending
    title:
      kind: string
      default: Cleveland
    x_label:
      kind: string
      default: Count
    y_label:
      kind: string
      default: ""
    segment_color:
      kind: string
      default: "#caccd1"
    point_color:
      kind: string
      default: "#1aafd0"
    point_fill:
      kind: string
      default: "#ffffff"
    outer_point_size:
      kind: number
      default: 5
    inner_point_size:
      kind: number
      default: 3
    segment_width:
      kind: number
      default: 0.6
    base_size:
      kind: number
      default: 14
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 5
    height:
      kind: number
      default: 5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - scatter_cleveland
  - cleveland_dot
  - cleveland_plot
  - ranked_dot
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.item_column}
    - ${params.value_column}
    - ${params.top_n}
    - ${params.sort_order}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.segment_color}
    - ${params.point_color}
    - ${params.point_fill}
    - ${params.outer_point_size}
    - ${params.inner_point_size}
    - ${params.segment_width}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
