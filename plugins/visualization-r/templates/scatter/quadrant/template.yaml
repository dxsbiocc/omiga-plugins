apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_quadrant
  version: 0.1.0
  name: Quadrant Scatter Plot
  description: Scatter plot with x/y threshold lines and automatic quadrant labels.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - quadrant
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - quadrant
    - table
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table. See this template's example.tsv for the expected shape.
  params:
    x_column:
      kind: string
      default: x_value
    y_column:
      kind: string
      default: y_value
    label_column:
      kind: string
      default: label
      description: Optional label column. Use an empty string for no labels.
    group_column:
      kind: string
      default: group
      description: Optional color group column. Use an empty string to color by derived quadrant.
    x_threshold:
      kind: number
      default: 0
    y_threshold:
      kind: number
      default: 0
    title:
      kind: string
      default: Quadrant scatter plot
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 7
    height:
      kind: number
      default: 5.5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - quadrant
  - quadrant_scatter
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.x_column}
    - ${params.y_column}
    - ${params.label_column}
    - ${params.group_column}
    - ${params.x_threshold}
    - ${params.y_threshold}
    - ${params.title}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
