apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_enrichment_dot
  version: 0.1.0
  name: Enrichment Dot Plot
  description: Dot plot for ranked enrichment/result tables.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - dotplot
    - enrichment
    - omics-preset
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - dotplot
    - enrichment
    - omics-preset
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV enrichment table. See example.tsv.
  params:
    term_column:
      kind: string
      default: term
    category_column:
      kind: string
      default: category
    size_column:
      kind: string
      default: gene_count
    x_column:
      kind: string
      default: ratio
    pvalue_column:
      kind: string
      default: p_adjust
    top_n:
      kind: integer
      default: 10
    title:
      kind: string
      default: Enrichment dot plot
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 5.5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    top_terms_tsv:
      kind: file
      glob: top_terms.tsv
      required: false
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - enrichment_dot
  - enrichment_dotplot
  - dotplot_enrichment
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.term_column}
    - ${params.category_column}
    - ${params.size_column}
    - ${params.x_column}
    - ${params.pvalue_column}
    - ${params.top_n}
    - ${params.title}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
