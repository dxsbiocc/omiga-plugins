apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_pca_score
  version: 0.1.0
  name: PCA Score Plot
  description: PCA score scatter plot from a sample-by-feature table.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - pca
    - dimension-reduction
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - pca
    - dimension-reduction
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Sample-by-feature CSV/TSV table. See example.tsv.
  params:
    sample_column:
      kind: string
      default: sample
    group_column:
      kind: string
      default: group
    feature_columns:
      kind: string
      default: auto
      description: Comma-separated numeric feature columns, or auto.
    title:
      kind: string
      default: PCA score plot
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 7
    height:
      kind: number
      default: 5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    scores_tsv:
      kind: file
      glob: scores.tsv
      required: false
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - pca_score
  - pca_plot
  - scatter_pca
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.sample_column}
    - ${params.group_column}
    - ${params.feature_columns}
    - ${params.title}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
