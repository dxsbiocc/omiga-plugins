apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_scatter_rect_dumbbell
  version: 0.1.0
  name: Rect Dumbbell
  description: Rectangular dumbbell plot comparing two groups across ordered categories with shaded value ranges and endpoint dots.
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - dumbbell
    - paired
classification:
  category: visualization/scatter
  tags:
    - visualization
    - r
    - ggplot2
    - scatter
    - dumbbell
    - paired
    - rectangular-range
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with category, numeric value, and two-level group columns. See example.tsv converted from OmicsAgent scatter/dumbbell_rect data.json.
  params:
    category_column:
      kind: string
      default: age_group
    value_column:
      kind: string
      default: mean_prev
    group_column:
      kind: string
      default: Sex
    category_order:
      kind: string
      default: ''
      description: Optional comma-separated category order. Empty keeps first-seen order.
    group_order:
      kind: string
      default: Male,Female
      description: Comma-separated group order; first two groups define the range rectangles.
    title:
      kind: string
      default: Rect Dumbbell
    x_label:
      kind: string
      default: ''
    y_label:
      kind: string
      default: Mean Prevalence of obesity
    palette:
      kind: string
      default: '#f784b6,#79ceb8'
    rect_fill:
      kind: string
      default: '#f3ead8'
    rect_color:
      kind: string
      default: grey50
    rect_width:
      kind: number
      default: 0.8
    rect_alpha:
      kind: number
      default: 0.85
    point_size_outer:
      kind: number
      default: 5
    point_size_inner:
      kind: number
      default: 3
    stroke:
      kind: number
      default: 1
    base_size:
      kind: number
      default: 12
    rotate_x_labels:
      kind: boolean
      default: true
    legend_x:
      kind: number
      default: 0.8
    legend_y:
      kind: number
      default: 0.8
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - scatter_dumbbell_rect
  - dumbbell_rect
  - rect_dumbbell
  - rectangular_dumbbell
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.category_column}
    - ${params.value_column}
    - ${params.group_column}
    - ${params.category_order}
    - ${params.group_order}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.palette}
    - ${params.rect_fill}
    - ${params.rect_color}
    - ${params.rect_width}
    - ${params.rect_alpha}
    - ${params.point_size_outer}
    - ${params.point_size_inner}
    - ${params.stroke}
    - ${params.base_size}
    - ${params.rotate_x_labels}
    - ${params.legend_x}
    - ${params.legend_y}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
