apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_bar_pathway_expand
  version: 0.1.0
  name: Pathway Expand
  description: Category-expanded enrichment bar chart migrated from OmicsAgent bar/enrichment_expand.
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - enrichment
    - pathway
    - table
classification:
  category: visualization/bar
  tags:
    - visualization
    - r
    - ggplot2
    - bar
    - enrichment
    - pathway
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Enrichment CSV/TSV with category, pathway label, adjusted p-value, and count columns. See example.tsv converted from OmicsAgent data.json.
  params:
    category_column:
      kind: string
      default: category
    term_column:
      kind: string
      default: Description
    pvalue_column:
      kind: string
      default: p.adjust
    count_column:
      kind: string
      default: Count
    title:
      kind: string
      default: KEGG enrichment
    x_label:
      kind: string
      default: "-log10(p.adjust)"
    category_order:
      kind: string
      default: auto
      description: Comma-separated category order, or auto to preserve input order.
    palette:
      kind: string
      default: "#3BE8B0,#1AAFD0,#6A67CE,#FFB900,#FC636B"
    pvalue_floor:
      kind: number
      default: 1e-8
    max_log10_pvalue:
      kind: number
      default: 8
    x_breaks:
      kind: string
      default: auto
    label_x:
      kind: number
      default: 0.06
    term_size:
      kind: number
      default: 4.2
    header_size:
      kind: number
      default: 5.2
    count_size:
      kind: number
      default: 3.4
    bar_width:
      kind: number
      default: 0.72
    bar_alpha:
      kind: number
      default: 0.62
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 10
    height:
      kind: number
      default: 9
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - enrichment_expand
  - pathway_expand
  - expand_bar
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.category_column}
    - ${params.term_column}
    - ${params.pvalue_column}
    - ${params.count_column}
    - ${params.title}
    - ${params.x_label}
    - ${params.category_order}
    - ${params.palette}
    - ${params.pvalue_floor}
    - ${params.max_log10_pvalue}
    - ${params.x_breaks}
    - ${params.label_x}
    - ${params.term_size}
    - ${params.header_size}
    - ${params.count_size}
    - ${params.bar_width}
    - ${params.bar_alpha}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
