apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_distribution_raincloud
  version: 0.1.0
  name: Raincloud Plot
  description: Horizontal raincloud distribution plot with stacked sample dots and half-density clouds, migrated from OmicsAgent boxplot/raincloud.
  tags:
    - visualization
    - r
    - ggplot2
    - distribution
    - raincloud
    - dotplot
    - half-density
    - table
classification:
  category: visualization/distribution
  tags:
    - visualization
    - r
    - ggplot2
    - distribution
    - raincloud
    - dotplot
    - half-density
  stageInput:
    - table
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Long-form CSV/TSV table with group and numeric value columns. See example.tsv converted from OmicsAgent data.json.
  params:
    group_column:
      kind: string
      default: gene
    value_column:
      kind: string
      default: expression
    title:
      kind: string
      default: ""
    x_label:
      kind: string
      default: Gene expression level
    y_label:
      kind: string
      default: ""
    group_order:
      kind: string
      default: auto
      description: Comma-separated group order, or auto.
    palette:
      kind: string
      default: "#009392,#39b185,#9ccb86,#e9e29c,#eeb479,#e88471,#cf597e"
      description: Comma-separated group colors; interpolated when there are more groups.
    dot_binwidth:
      kind: number
      default: 0.1
      description: Value-bin width used to stack sample dots.
    dot_size:
      kind: number
      default: 2
    dot_alpha:
      kind: number
      default: 0.85
    dot_stack_width:
      kind: number
      default: 0.32
      description: Maximum vertical stack offset for dots after coordinate flip.
    density_width:
      kind: number
      default: 0.42
      description: Maximum width of the half-density cloud before coordinate flip.
    density_nudge:
      kind: number
      default: 0.2
    base_size:
      kind: number
      default: 12
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 6
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - raincloud
  - raincloud_plot
  - distribution_raincloud
  - boxplot_raincloud
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.group_column}
    - ${params.value_column}
    - ${params.title}
    - ${params.x_label}
    - ${params.y_label}
    - ${params.group_order}
    - ${params.palette}
    - ${params.dot_binwidth}
    - ${params.dot_size}
    - ${params.dot_alpha}
    - ${params.dot_stack_width}
    - ${params.density_width}
    - ${params.density_nudge}
    - ${params.base_size}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
