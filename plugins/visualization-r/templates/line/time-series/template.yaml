apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_line_time_series
  version: 0.1.0
  name: Time Series
  description: Multi-series time-course line plot with optional lower/upper confidence bands.
  tags:
  - visualization
  - r
  - ggplot2
  - line
  - time-series
classification:
  category: visualization/line
  tags:
  - visualization
  - r
  - ggplot2
  - line
  - time-series
  stageInput:
  - table
  stageOutput:
  - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Input CSV/TSV table. See this template's example.tsv for the expected shape.
  params:
    time_column:
      kind: string
      default: time
    value_column:
      kind: string
      default: value
    series_column:
      kind: string
      default: series
    lower_column:
      kind: string
      default: lower
      description: Optional lower confidence/interval column. Use an empty string to disable ribbons.
    upper_column:
      kind: string
      default: upper
      description: Optional upper confidence/interval column. Use an empty string to disable ribbons.
    title:
      kind: string
      default: Time series line plot
    delimiter:
      kind: enum
      enum:
      - auto
      - tab
      - comma
      default: auto
    width:
      kind: number
      default: 8
    height:
      kind: number
      default: 5
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
- time_series
- timecourse
- time_series_line
execution:
  interpreter: Rscript
  argv:
  - ${inputs.table}
  - ${outdir}
  - ${params.time_column}
  - ${params.value_column}
  - ${params.series_column}
  - ${params.lower_column}
  - ${params.upper_column}
  - ${params.title}
  - ${params.delimiter}
  - ${params.width}
  - ${params.height}
  - ${params.dpi}
