apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: viz_heatmap_split
  version: 0.1.0
  name: Split Heatmap
  description: Two-set correlation heatmap for anchor variables versus target variables with significance stars and non-significant crosses.
  tags:
    - visualization
    - r
    - ggplot2
    - heatmap
    - correlation
    - split
classification:
  category: visualization/heatmap
  tags:
    - visualization
    - r
    - ggplot2
    - heatmap
    - correlation
    - split
  stageInput:
    - numeric_matrix
  stageOutput:
    - static_figure
exposure:
  exposeToAgent: true
interface:
  inputs:
    table:
      kind: file
      required: true
      description: Wide numeric CSV/TSV table containing anchor columns and target columns. See example.tsv converted from OmicsAgent heatmap/two data.json.
  params:
    anchor_columns:
      kind: string
      default: YAP1,WWTR1,TEAD1,TEAD2,TEAD3,TEAD4,SMAD1,SMAD2,SMAD3,SMAD4
      description: Comma-separated anchor columns shown across the x-axis.
    target_columns:
      kind: string
      default: ''
      description: Optional comma-separated target columns shown on the y-axis; empty uses all numeric columns not listed as anchors.
    feature_column:
      kind: string
      default: ''
      description: Optional row-label column excluded from correlation. Leave empty if all columns are numeric.
    method:
      kind: enum
      enum: [pearson, spearman, kendall]
      default: spearman
    alpha:
      kind: number
      default: 0.05
    star_threshold:
      kind: number
      default: 0.3
      description: Minimum absolute correlation for drawing significance stars.
    title:
      kind: string
      default: Split Heatmap
    low_color:
      kind: string
      default: '#009dd3'
    mid_color:
      kind: string
      default: '#ffffff'
    high_color:
      kind: string
      default: '#f29c98'
    cross_color:
      kind: string
      default: '#f5e797'
    base_size:
      kind: number
      default: 9
    show_values:
      kind: boolean
      default: false
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
    width:
      kind: number
      default: 7
    height:
      kind: number
      default: 7.2
    dpi:
      kind: integer
      default: 300
  outputs:
    figure_png:
      kind: file
      glob: figure.png
      required: true
      description: PNG figure.
    figure_pdf:
      kind: file
      glob: figure.pdf
      required: true
      description: PDF figure.
    plot_script:
      kind: file
      glob: plot-script.R
      required: true
      description: Default rendered Rscript source artifact for one-off customization.
    rerun_script:
      kind: file
      glob: rerun.sh
      required: true
      description: Default helper to rerun the rendered Rscript source with the same arguments.
    summary_tsv:
      kind: file
      glob: summary.tsv
      required: false
    summary:
      kind: json
      required: false
runtime:
  envRef: r-base
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - heatmap_two
  - two_heatmap
  - split_heatmap
  - two_set_heatmap
execution:
  interpreter: Rscript
  argv:
    - ${inputs.table}
    - ${outdir}
    - ${params.anchor_columns}
    - ${params.target_columns}
    - ${params.feature_column}
    - ${params.method}
    - ${params.alpha}
    - ${params.star_threshold}
    - ${params.title}
    - ${params.low_color}
    - ${params.mid_color}
    - ${params.high_color}
    - ${params.cross_color}
    - ${params.base_size}
    - ${params.show_values}
    - ${params.delimiter}
    - ${params.width}
    - ${params.height}
    - ${params.dpi}
