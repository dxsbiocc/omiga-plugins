apiVersion: omiga.ai/environment/v1alpha1
kind: Environment
metadata:
  id: ngs-star
  version: 0.1.0
  name: STAR
  description: Conda environment for STAR genome indexing and RNA-seq alignment; includes samtools for SAM/BAM conversion, sorting, and indexing.
  tags: [bioinformatics, ngs, alignment, star, rna-seq]
runtime:
  type: conda
  condaEnvFile: ./conda.yaml
requirements:
  system:
    - micromamba or mamba or conda
  notes:
    - Environment is created under .omiga/operator-envs/conda and reused by hash.
diagnostics:
  checkCommand: [STAR, --version]
  installHint: Install the official micromamba binary at $HOME/.omiga/bin/micromamba or set OMIGA_MICROMAMBA; Omiga can create this env from conda.yaml/conda.yml.
