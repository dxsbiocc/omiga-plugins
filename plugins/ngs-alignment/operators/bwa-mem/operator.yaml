apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: bwa_mem_align_reads
  version: 0.1.0
  name: BWA MEM Align Reads
  description: Align single-end or paired-end FASTQ reads to a BWA-indexed reference with bwa mem.
  tags: [bioinformatics, ngs, alignment, bwa, fastq, sam, bam]
interface:
  inputs:
    reference:
      kind: file
      required: true
      description: Indexed reference FASTA or BWA index prefix accepted by bwa mem.
    reads1:
      kind: file
      required: true
      description: FASTQ reads, or mate 1 FASTQ for paired-end data.
    reads2:
      kind: file
      required: false
      description: Optional mate 2 FASTQ for paired-end data.
  params:
    threads:
      kind: integer
      default: 4
      minimum: 1
      maximum: 128
    output:
      kind: enum
      enum: [sam, bam, sorted_bam]
      default: sorted_bam
      description: Output SAM, unsorted BAM, or coordinate-sorted BAM.
    sort_order:
      kind: enum
      enum: [coordinate, queryname]
      default: coordinate
    index_bam:
      kind: boolean
      default: true
      description: Index coordinate-sorted BAM output with samtools index.
    extra:
      kind: string
      default: ""
      description: Additional bwa mem arguments; do not include -t.
  outputs:
    alignment:
      kind: file
      glob: bwa-aligned.*
      required: true
    alignment_index:
      kind: file
      glob: bwa-aligned.bam.bai
      required: false
    summary:
      kind: json
      required: true
runtime:
  envRef: ngs-bwa
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
resources:
  cpu:
    default: 4
    exposed: true
  walltime:
    default: 7200s
    exposed: true
execution:
  argv:
    - python3
    - ./scripts/ngs_alignment.py
    - bwa-mem
    - ${inputs.reference}
    - ${inputs.reads1}
    - ${inputs.reads2}
    - ${outdir}
    - ${params.threads}
    - ${params.output}
    - ${params.sort_order}
    - ${params.index_bam}
    - ${params.extra}
