apiVersion: omiga.ai/operator/v1alpha1
kind: Operator
metadata:
  id: omics_pca_matrix
  version: 0.1.0
  name: Omics PCA Matrix
  description: Run base-R PCA on an expression/count matrix and write scores, loadings, explained variance, and an SVG plot.
  tags: [omics, pca, expression, r]
interface:
  inputs:
    matrix:
      kind: file
      required: true
      description: Numeric matrix file. Default assumes features/genes in rows and samples in columns, with feature ids in the first column.
    metadata:
      kind: file
      required: false
      description: Optional sample metadata with sample and group/condition columns. Used to color the default PCA plot and tolerated if omitted.
  params:
    delimiter:
      kind: enum
      enum: [auto, tab, comma]
      default: auto
      description: Matrix delimiter detection mode.
    row_names:
      kind: boolean
      default: true
      description: Treat first matrix column as row/feature names.
    features_by_rows:
      kind: boolean
      default: true
      description: true for genes/features as rows and samples as columns; false for samples as rows.
    center:
      kind: boolean
      default: true
    scale:
      kind: boolean
      default: true
    top_variable_features:
      kind: integer
      default: 5000
      minimum: 2
      maximum: 100000
      description: Limit PCA to the most variable features before zero-variance filtering.
    sample_column:
      kind: string
      default: sample
      description: Sample column in metadata. Common alternatives such as sample_id are auto-detected when this column is absent.
    group_column:
      kind: string
      default: group
      description: Group/condition column in metadata. Common alternatives such as condition or treatment are auto-detected when this column is absent.
    plot_labels:
      kind: boolean
      default: true
      description: Add sample labels to the default PCA scatter plot.
    confidence_hulls:
      kind: boolean
      default: true
      description: Draw convex hulls around groups with at least three samples.
  outputs:
    scores:
      kind: file
      glob: pca-scores.tsv
      required: true
    loadings:
      kind: file
      glob: pca-loadings.tsv
      required: true
    variance:
      kind: file
      glob: pca-variance.tsv
      required: true
    group_summary:
      kind: file
      glob: pca-group-summary.tsv
      required: true
    plot:
      kind: file
      glob: pca-plot.svg
      required: true
    scree_plot:
      kind: file
      glob: pca-scree.svg
      required: true
    summary:
      kind: json
      required: true
      description: Structured run summary from outputs.json.
runtime:
  placement:
    supported: [local, ssh]
  container:
    supported: [none]
resources:
  cpu:
    default: 1
    exposed: true
  walltime:
    default: 300s
    exposed: true
execution:
  argv:
    - Rscript
    - ./scripts/pca_matrix.R
    - ${inputs.matrix}
    - ${outdir}
    - ${params.delimiter}
    - ${params.row_names}
    - ${params.features_by_rows}
    - ${params.center}
    - ${params.scale}
    - ${params.top_variable_features}
    - ${inputs.metadata}
    - ${params.sample_column}
    - ${params.group_column}
    - ${params.plot_labels}
    - ${params.confidence_hulls}
