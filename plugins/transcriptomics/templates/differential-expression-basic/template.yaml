apiVersion: omiga.ai/unit/v1alpha1
kind: Template
metadata:
  id: bulk_differential_expression_basic
  version: 0.3.0
  name: Bulk Differential Expression
  description: Rendered R differential-expression analysis template with its own generated script body and private validation/preflight metadata.
  tags:
    - omics
    - transcriptomics
    - differential-expression
    - bulk-rnaseq
classification:
  category: omics/transcriptomics/differential
  tags:
    - rna
    - bulk-rnaseq
    - differential
    - table
    - figure
  stageInput:
    - count_matrix
    - sample_metadata
  stageOutput:
    - diff_results
    - differential_plots
exposure:
  exposeToAgent: true
interface:
  inputs: {}
  params: {}
  outputs: {}
runtime:
  envRef: r-bioc
template:
  engine: jinja2
  entry: ./template.R.j2
aliases:
  - bulk_de
  - differential_expression_basic
execution:
  interpreter: Rscript
  fallbackToMigrationTarget: true
  argv:
    - ${inputs.matrix}
    - ${inputs.metadata}
    - ${outdir}
    - ${params.group_column}
    - ${params.case_group}
    - ${params.control_group}
    - ${params.sample_column}
    - ${params.delimiter}
    - ${params.row_names}
    - ${params.pseudocount}
    - ${params.log2fc_threshold}
    - ${params.pvalue_threshold}
    - ${params.comparisons}
    - ${params.input_data_type}
    - ${params.de_method}
migrationTarget: omics_differential_expression_basic
