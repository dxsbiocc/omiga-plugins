apiVersion: omiga.ai/environment/v1alpha1
kind: Environment
metadata:
  id: r-bioc
  version: 0.1.0
  name: R / Bioconductor
  description: R / Bioconductor differential expression runtime.
  tags: [r, bioconductor, omics]
runtime:
  type: system
  command: Rscript
requirements:
  system: [Rscript]
  rPackages: [DESeq2, edgeR, limma, ggplot2]
  notes:
    - V3 resolves and records this profile before execution; it does not install packages automatically.
diagnostics:
  checkCommand: [Rscript, --version]
  installHint: Install R/Rscript and required R/Bioconductor packages before running this Template, or configure a future envRef resolver profile for conda/docker/module execution.
